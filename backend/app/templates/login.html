{% extends "base.html" %}
{% block title %}Connexion — Monito{% endblock %}

{% block content %}
<section style="min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:1rem">
    <div class="container-sm" style="width:100%">
        <div style="text-align:center;margin-bottom:2.5rem">
            <div class="navbar-logo" style="justify-content:center;margin-bottom:1rem">
                <div class="logo-icon">M</div>
                <span style="font-size:1.25rem">Monito</span>
            </div>
            <h1 style="font-size:1.5rem;margin-bottom:0.375rem">Connexion</h1>
            <p style="color:var(--text-secondary);font-size:0.875rem">
                Entrez votre email pour recevoir un lien magique.
            </p>
        </div>

        <div class="card" style="max-width:400px;margin:0 auto">
            <form hx-post="/auth/magic-link"
                  hx-target="#magic-result"
                  hx-swap="innerHTML"
                  hx-indicator="#loading-indicator"
                  style="display:flex;flex-direction:column;gap:1rem">
                <div>
                    <label for="email">Adresse email</label>
                    <input type="email"
                           id="email"
                           name="email"
                           required
                           placeholder="vous@exemple.fr"
                           class="input"
                           autocomplete="email">
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" style="justify-content:center">
                    <span>Envoyer le lien magique</span>
                    <span id="loading-indicator" class="htmx-indicator animate-spin" style="width:18px;height:18px;border-width:2px;flex-shrink:0"></span>
                </button>
            </form>

            <div id="magic-result" class="mt-4"></div>
        </div>

        <p style="text-align:center;font-size:0.75rem;color:var(--text-muted);margin-top:1.5rem">
            Pas de mot de passe à retenir. Un lien de connexion vous sera envoyé par email.
        </p>
    </div>
</section>
{% endblock %}
